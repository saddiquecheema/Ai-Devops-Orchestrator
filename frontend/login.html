<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — DevOps Orchestrator</title>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script>
        (function () {
            const token = localStorage.getItem('token');
            const fromLogout = sessionStorage.getItem('logged_out');
            if (token && !fromLogout) {
                window.location.replace('projects.html');
            }
            sessionStorage.removeItem('logged_out');
        })();
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Figtree', sans-serif;
            background: #080c14;
            color: #e2eaf4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: #0d1320;
            border: 1px solid #1c2a3a;
            border-radius: 16px;
            padding: 36px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, .5);
        }

        .logo {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin: 0 auto 20px;
            box-shadow: 0 4px 20px rgba(59, 130, 246, .35);
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 13px;
            color: #5a7090;
            text-align: center;
            margin-bottom: 28px;
        }

        .field {
            margin-bottom: 18px;
        }

        .field-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: #5a7090;
        }

        .pwd-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #5a7090;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            transition: color .2s;
        }

        .pwd-toggle:hover {
            color: #a0b4c8;
        }

        .pwd-wrapper {
            position: relative;
        }

        .forgot-btn {
            background: none;
            border: none;
            font-size: 12px;
            color: #3b82f6;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Figtree', sans-serif;
            padding: 0;
            transition: color .2s;
        }

        .forgot-btn:hover {
            color: #60a5fa;
        }

        .form-input {
            background: #111927 !important;
            border: 1px solid #1c2a3a;
            color: #e2eaf4 !important;
            padding: 11px 14px;
            border-radius: 9px;
            width: 100%;
            font-size: 14px;
            font-family: 'Figtree', sans-serif;
            transition: border-color .2s;
            -webkit-text-fill-color: #e2eaf4 !important;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        /* Fix autofill white background */
        .form-input:-webkit-autofill,
        .form-input:-webkit-autofill:hover,
        .form-input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #111927 inset !important;
            -webkit-text-fill-color: #e2eaf4 !important;
            border-color: #1c2a3a !important;
        }

        .error-box {
            display: none;
            font-size: 12px;
            color: #f87171;
            background: rgba(239, 68, 68, .08);
            border: 1px solid rgba(239, 68, 68, .2);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            border: none;
            border-radius: 9px;
            padding: 12px;
            font-weight: 700;
            font-size: 14px;
            color: white;
            width: 100%;
            cursor: pointer;
            font-family: 'Figtree', sans-serif;
            transition: opacity .2s, transform .1s;
            margin-top: 4px;
        }

        .btn-primary:hover {
            opacity: .9;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: .6;
            cursor: not-allowed;
            transform: none;
        }

        .bottom-link {
            text-align: center;
            font-size: 13px;
            color: #5a7090;
            margin-top: 20px;
        }

        .bottom-link a {
            color: #3b82f6;
            font-weight: 600;
            text-decoration: none;
        }

        .bottom-link a:hover {
            text-decoration: underline;
        }

        /* ── Forgot Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .75);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #0d1320;
            border: 1px solid #1c2a3a;
            border-radius: 16px;
            width: 100%;
            max-width: 380px;
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #1c2a3a;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .modal-body {
            padding: 20px 24px;
        }

        .modal-input {
            background: #111927 !important;
            border: 1px solid #1c2a3a;
            color: #e2eaf4 !important;
            padding: 11px 14px;
            border-radius: 9px;
            width: 100%;
            font-size: 14px;
            font-family: 'Figtree', sans-serif;
            -webkit-text-fill-color: #e2eaf4 !important;
        }

        .modal-input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .close-btn {
            background: rgba(255, 255, 255, .05);
            border: 1px solid #1c2a3a;
            border-radius: 8px;
            padding: 5px 10px;
            color: #5a7090;
            cursor: pointer;
            font-size: 13px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .btn-ghost {
            flex: 1;
            background: transparent;
            border: 1px solid #1c2a3a;
            border-radius: 8px;
            padding: 10px;
            color: #5a7090;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Figtree', sans-serif;
        }

        .btn-blue {
            flex: 1;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            border: none;
            border-radius: 8px;
            padding: 10px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Figtree', sans-serif;
        }

        .info-box {
            display: none;
            font-size: 12px;
            border-radius: 8px;
            padding: 10px 12px;
            margin-top: 12px;
        }
    </style>
</head>

<body>

    <div class="auth-card">
        <div class="logo"><svg width="48" height="48" viewBox="0 0 48 48" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <rect width="48" height="48" rx="12" fill="url(#lg)" />
                <path d="M13 25h4.5m0 0l2.5-5 4 10 3-7 2 2.5H35" stroke="white" stroke-width="2.2"
                    stroke-linecap="round" stroke-linejoin="round" />
                <circle cx="24" cy="24" r="10" stroke="white" stroke-width="1.4" stroke-dasharray="2.5 2"
                    opacity="0.35" />
                <defs>
                    <linearGradient id="lg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#3b82f6" />
                        <stop offset="1" stop-color="#6366f1" />
                    </linearGradient>
                </defs>
            </svg></div>
        <h1>Sign In</h1>
        <p class="subtitle">DevOps AI Orchestrator</p>

        <form id="login-form">
            <div class="field">
                <label>Email</label>
                <input type="email" id="login-email" class="form-input" placeholder="you@company.com" required
                    oninput="document.getElementById('login-error').style.display='none'">
            </div>

            <div class="field">
                <div class="field-header">
                    <label>Password</label>
                    <button type="button" class="forgot-btn" onclick="openForgot()">Forgot password?</button>
                </div>
                <div class="pwd-wrapper">
                    <input type="password" id="login-password" class="form-input" placeholder="••••••••" required
                        oninput="document.getElementById('login-error').style.display='none'"
                        style="padding-right:42px;">
                    <button type="button" class="pwd-toggle" onclick="togglePwd('login-password', this)"
                        title="Show/Hide password">
                        <svg id="eye-login" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="error-box" id="login-error"></div>

            <button type="submit" class="btn-primary" id="login-btn">Login</button>
        </form>

        <div class="bottom-link">
            Don't have an account? <a href="register.html">Create Account</a>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal-overlay" id="forgot-overlay">
        <div class="modal">
            <div class="modal-header">
                <div>
                    <div style="font-size:15px;font-weight:700;">Reset Password</div>
                    <div style="font-size:12px;color:#5a7090;margin-top:2px;">Enter your registered email</div>
                </div>
                <button class="close-btn" onclick="closeForgot()">✕</button>
            </div>
            <div class="modal-body">
                <form id="forgot-form">
                    <label
                        style="display:block;font-size:11px;font-weight:600;text-transform:uppercase;color:#5a7090;margin-bottom:6px;">Email
                        Address</label>
                    <input type="email" id="forgot-email" class="modal-input" placeholder="you@company.com" required>
                    <div class="info-box" id="forgot-msg"></div>
                    <div class="modal-actions">
                        <button type="button" class="btn-ghost" onclick="closeForgot()">Cancel</button>
                        <button type="submit" class="btn-blue">Send Instructions</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // ── Password Toggle ───────────────────────────────────────────────
        function togglePwd(inputId, btn) {
            const input = document.getElementById(inputId);
            const show = input.type === 'password';
            input.type = show ? 'text' : 'password';
            btn.innerHTML = show
                ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
                : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        }

        // ── Forgot Password ───────────────────────────────────────────────
        function openForgot() {
            document.getElementById('forgot-overlay').classList.add('open');
            setTimeout(() => document.getElementById('forgot-email').focus(), 100);
        }
        function closeForgot() {
            document.getElementById('forgot-overlay').classList.remove('open');
            document.getElementById('forgot-email').value = '';
            document.getElementById('forgot-msg').style.display = 'none';
        }
        document.getElementById('forgot-overlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('forgot-overlay')) closeForgot();
        });
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('forgot-email').value;
            const msg = document.getElementById('forgot-msg');
            const btn = e.target.querySelector('button[type=submit]');
            btn.textContent = 'Sending...';
            btn.disabled = true;

            await fetch('http://127.0.0.1:8000/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            // Always redirect to verify page (don't reveal if email exists)
            window.location.href = `verify-email.html?email=${encodeURIComponent(email)}&purpose=reset`;
        });

        // ── Login ─────────────────────────────────────────────────────────
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errDiv = document.getElementById('login-error');
            btn.textContent = 'Signing in...';
            btn.disabled = true;

            const formData = new FormData();
            formData.append('username', document.getElementById('login-email').value);
            formData.append('password', document.getElementById('login-password').value);

            try {
                const res = await fetch('http://127.0.0.1:8000/auth/login', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    window.location.href = 'projects.html';
                } else {
                    const detail = data.detail || 'Invalid email or password.';
                    // If unverified, redirect to verify page
                    if (detail.toLowerCase().includes('verify')) {
                        const email = document.getElementById('login-email').value;
                        window.location.href = `verify-email.html?email=${encodeURIComponent(email)}&purpose=verify`;
                        return;
                    }
                    errDiv.textContent = detail;
                    errDiv.style.display = 'block';
                    btn.textContent = 'Login';
                    btn.disabled = false;
                }
            } catch (e) {
                errDiv.textContent = 'Unable to connect to server.';
                errDiv.style.display = 'block';
                btn.textContent = 'Login';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
