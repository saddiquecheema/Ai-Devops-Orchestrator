<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — DevOps Orchestrator</title>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Figtree', sans-serif;
            background: #080c14;
            color: #e2eaf4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #0d1320;
            border: 1px solid #1c2a3a;
            border-radius: 16px;
            padding: 36px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, .5);
        }

        .icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: linear-gradient(135deg, #ef4444, #f97316);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin: 0 auto 20px;
            box-shadow: 0 4px 20px rgba(239, 68, 68, .3);
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 13px;
            color: #5a7090;
            text-align: center;
            margin-bottom: 28px;
        }

        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: #5a7090;
            margin-bottom: 6px;
        }

        .form-input {
            background: #111927 !important;
            border: 1px solid #1c2a3a;
            color: #e2eaf4 !important;
            padding: 11px 14px;
            border-radius: 9px;
            width: 100%;
            font-size: 14px;
            font-family: 'Figtree', sans-serif;
            transition: border-color .2s;
            -webkit-text-fill-color: #e2eaf4 !important;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .form-input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px #111927 inset !important;
        }

        .pwd-rules {
            margin-top: 8px;
            background: #0a0f1a;
            border: 1px solid #1c2a3a;
            border-radius: 8px;
            padding: 10px 12px;
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .pwd-rules.visible {
            display: grid;
        }

        .rule {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #4a6070;
            transition: color .2s;
        }

        .rule.pass {
            color: #4ade80;
        }

        .rule.fail {
            color: #f87171;
        }

        .rule-icon {
            font-size: 13px;
            width: 14px;
            text-align: center;
            flex-shrink: 0;
        }

        .error-box {
            display: none;
            font-size: 12px;
            color: #f87171;
            background: rgba(239, 68, 68, .08);
            border: 1px solid rgba(239, 68, 68, .2);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 14px;
        }

        .success-box {
            display: none;
            font-size: 12px;
            color: #4ade80;
            background: rgba(34, 197, 94, .08);
            border: 1px solid rgba(34, 197, 94, .2);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ef4444, #f97316);
            border: none;
            border-radius: 9px;
            padding: 12px;
            font-weight: 700;
            font-size: 14px;
            color: white;
            width: 100%;
            cursor: pointer;
            font-family: 'Figtree', sans-serif;
            transition: opacity .2s;
        }

        .btn-primary:hover {
            opacity: .9;
        }

        .btn-primary:disabled {
            opacity: .6;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon" style="background:none;box-shadow:none;"><svg width="48" height="48" viewBox="0 0 48 48"
                fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="48" height="48" rx="14" fill="url(#rlg)" />
                <rect x="16" y="22" width="16" height="12" rx="2" fill="white" opacity="0.9" />
                <path d="M19 22v-4a5 5 0 0 1 10 0v4" stroke="white" stroke-width="2.2" stroke-linecap="round"
                    fill="none" />
                <circle cx="24" cy="28" r="1.5" fill="#ef4444" />
                <defs>
                    <linearGradient id="rlg" x1="0" y1="0" x2="48" y2="48">
                        <stop stop-color="#ef4444" />
                        <stop offset="1" stop-color="#f97316" />
                    </linearGradient>
                </defs>
            </svg></div>
        <h1>Set New Password</h1>
        <p class="subtitle">Choose a strong password for your account</p>

        <div class="field">
            <label>New Password</label>
            <div style="position:relative;">
                <input type="password" id="new-password" class="form-input" placeholder="Min. 8 characters"
                    oninput="checkPwd(this.value)" style="padding-right:42px;">
                <button type="button" onclick="toggleNew()"
                    style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#5a7090;cursor:pointer;"
                    title="Show/Hide">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </button>
            </div>
            <div class="pwd-rules" id="pwd-rules">
                <div class="rule" id="r-len"><span class="rule-icon">○</span>8+ characters</div>
                <div class="rule" id="r-upper"><span class="rule-icon">○</span>Uppercase (A-Z)</div>
                <div class="rule" id="r-lower"><span class="rule-icon">○</span>Lowercase (a-z)</div>
                <div class="rule" id="r-num"><span class="rule-icon">○</span>Number (0-9)</div>
                <div class="rule" id="r-special"><span class="rule-icon">○</span>Special (!@#$...)</div>
            </div>
        </div>

        <div class="field">
            <label>Confirm Password</label>
            <input type="password" id="confirm-password" class="form-input" placeholder="Re-enter password"
                oninput="checkMatch()">
            <div id="match-err" style="display:none;font-size:11px;color:#f87171;margin-top:5px;">Passwords do not match
            </div>
        </div>

        <div class="error-box" id="err-box"></div>
        <div class="success-box" id="ok-box"></div>

        <button class="btn-primary" id="reset-btn" onclick="resetPassword()">Reset Password</button>
    </div>

    <script>
        function toggleNew() {
            const inp = document.getElementById('new-password');
            const btn = document.querySelector('#new-password + button') || event.currentTarget;
            const show = inp.type === 'password';
            inp.type = show ? 'text' : 'password';
            btn.innerHTML = show
                ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
                : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        }
    </script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email') || '';
        const code = params.get('code') || '';

        if (!email || !code) window.location.replace('login.html');

        function checkPwd(val) {
            const rules = {
                'r-len': val.length >= 8,
                'r-upper': /[A-Z]/.test(val),
                'r-lower': /[a-z]/.test(val),
                'r-num': /[0-9]/.test(val),
                'r-special': /[!@#$%^&*(),.?":{}|<>_\-+=~`]/.test(val),
            };
            const box = document.getElementById('pwd-rules');
            box.classList.toggle('visible', val.length > 0);

            Object.entries(rules).forEach(([id, pass]) => {
                const el = document.getElementById(id);
                const icon = el.querySelector('.rule-icon');
                if (!val.length) { el.className = 'rule'; icon.textContent = '○'; return; }
                el.className = 'rule ' + (pass ? 'pass' : 'fail');
                icon.textContent = pass ? '✓' : '✗';
            });

            const input = document.getElementById('new-password');
            const allPass = Object.values(rules).every(Boolean);
            input.style.borderColor = !val.length ? '#1c2a3a' : allPass ? '#4ade80' : '#f87171';
            return allPass;
        }

        function checkMatch() {
            const p1 = document.getElementById('new-password').value;
            const p2 = document.getElementById('confirm-password').value;
            const err = document.getElementById('match-err');
            const input = document.getElementById('confirm-password');
            if (p2.length === 0) { err.style.display = 'none'; input.style.borderColor = '#1c2a3a'; return true; }
            const match = p1 === p2;
            err.style.display = match ? 'none' : 'block';
            input.style.borderColor = match ? '#4ade80' : '#f87171';
            return match;
        }

        async function resetPassword() {
            const newPwd = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            const errBox = document.getElementById('err-box');
            const okBox = document.getElementById('ok-box');
            const btn = document.getElementById('reset-btn');

            errBox.style.display = 'none';

            if (!checkPwd(newPwd)) {
                errBox.textContent = 'Please meet all password requirements.';
                errBox.style.display = 'block';
                return;
            }
            if (!checkMatch() || newPwd !== confirm) {
                errBox.textContent = 'Passwords do not match.';
                errBox.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const res = await fetch('http://127.0.0.1:8000/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code, new_password: newPwd })
                });
                const data = await res.json();

                if (res.ok) {
                    okBox.textContent = '✓ Password reset successfully! Redirecting to login...';
                    okBox.style.display = 'block';
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    errBox.textContent = data.detail || 'Reset failed. Please try again.';
                    errBox.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                }
            } catch (e) {
                errBox.textContent = 'Connection error. Please try again.';
                errBox.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        }
    </script>
</body>

</html>
